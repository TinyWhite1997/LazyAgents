[workspace]
resolver = "2"
members = [
    "crates/la-ipc",
    "crates/la-pty",
    "integration/m0-smoke",
]

[workspace.package]
edition = "2021"
rust-version = "1.75"
license = "MIT"
repository = "https://github.com/TinyWhite1997/LazyAgents"

[workspace.dependencies]
bytes = "1.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.40", features = ["rt-multi-thread", "macros", "sync", "time", "io-util"] }
portable-pty = "0.8"
thiserror = "1"
tracing = "0.1"
nix = { version = "0.29", default-features = false, features = ["signal"] }
windows-sys = { version = "0.59", features = [
    "Win32_System_Console",
    "Win32_System_Threading",
    "Win32_Foundation",
] }
