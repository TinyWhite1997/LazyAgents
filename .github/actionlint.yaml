# Self-hosted / custom label list for actionlint.
# `macos-15-intel` was added by GitHub on 2025-09-19 as the x86_64 macOS
# successor to `macos-13` (retired 2025-12-04). actionlint 1.7.7's
# bundled label table pre-dates that announcement, so without this
# config the linter fires `label "macos-15-intel" is unknown`.
# See: https://github.blog/changelog/2025-09-19-github-actions-macos-13-runner-image-is-closing-down/
self-hosted-runner:
  labels:
    - macos-15-intel
