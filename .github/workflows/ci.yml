name: ci

# WEK-72 / M4.0.5 — PR-level three-OS matrix.
#
# Anchor A1 (matrix CI on PR before M4.1) + A5.3 (runner ↔ target pin).
# Job names are stable (`ci / <runner>`) so M4.6 can pin them as required
# checks on `main` once the matrix has been green for ≥1 PR cycle.
# Branch protection flip itself stays in M4.6 — this task only raises the
# signal.
#
# A5.3 runner pin table (do NOT use `*-latest` — release.yml shares this
# mapping and tag-cut reproducibility depends on the pin):
#
#   ubuntu-22.04   → x86_64-unknown-linux-gnu
#   macos-14       → aarch64-apple-darwin
#   macos-13       → x86_64-apple-darwin
#   windows-2022   → x86_64-pc-windows-msvc

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: ci / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-14
          - macos-13
          - windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.os }}

      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-22.04'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --lib --bins -- -D warnings

      # WEK-40: any la-proto type change must regenerate docs/schema/.
      # Run once on Linux — schema output is platform-independent, so
      # repeating on macOS/Windows would only burn minutes.
      - name: gen-schema --check (golden diff)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          out=$(mktemp -d)
          cargo run -q -p la-proto --bin la-proto-gen-schema -- "$out"
          if ! diff -ruN docs/schema "$out"; then
            echo
            echo '::error::docs/schema/ is stale. Re-run: cargo run -p la-proto --bin la-proto-gen-schema'
            exit 1
          fi

      - name: cargo test
        run: cargo test --workspace --all-targets

      # Folded in from the retired m2-smoke.yml — snapshots are useful for
      # diagnosing failures across runners, so upload per OS.
      - name: upload m2-smoke snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m2-smoke-snapshots-${{ matrix.os }}
          path: target/m2-smoke/snapshots/
          if-no-files-found: warn

      # WEK-72 DoD #1 step (lad config check): blocked on WEK-71 (M4.2)
      # merging the `lad config` subcommand and the example template
      # `crates/la-daemon/templates/config.example.toml`. Per the DoD,
      # whichever PR lands second is the one that wires this step in.
      # If WEK-71 merges first, uncomment and run on all matrix OSes:
      #
      # - name: lad config check (example template)
      #   shell: bash
      #   run: cargo run -p la-daemon --bin lad -- config check \
      #          --config crates/la-daemon/templates/config.example.toml
