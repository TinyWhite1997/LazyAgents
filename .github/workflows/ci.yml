name: ci

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# WEK-5 范围决策：v1 阶段只在 Linux 验证；代码保持跨平台兼容（cfg
# gates、portable-pty 等），但 CI 仅跑 ubuntu-latest。macOS / Windows
# 进入 M4 发布前再上 matrix。PR #7 误开了三端 matrix，已在本提交里
# 还原。
jobs:
  test:
    name: cargo test (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --lib --bins -- -D warnings
      - name: la-storage migration smoke
        run: cargo test -p la-storage migrations_enable_wal_and_schema_meta
      # WEK-40 验收：任何 la-proto 类型改动都必须同步 docs/schema/。
      # 这里在 cargo test 之前显式跑一次 gen-schema 并 diff，
      # 让「PR 没更新 schema」立刻在独立、易读的 step 里红，
      # 而不是埋在 cargo test 输出里的 schema_files_match_generated_output。
      - name: gen-schema --check (golden diff)
        run: |
          set -euo pipefail
          out=$(mktemp -d)
          cargo run -q -p la-proto --bin la-proto-gen-schema -- "$out"
          if ! diff -ruN docs/schema "$out"; then
            echo
            echo '::error::docs/schema/ is stale. Re-run: cargo run -p la-proto --bin la-proto-gen-schema'
            exit 1
          fi
      - name: cargo test
        run: cargo test --workspace --all-targets

  # WEK-51: Linux-only is the v1 verification scope, but the code must
  # stay cross-platform compilable. This job catches things like a crate
  # using `windows_sys::*` without declaring it in its own Cargo.toml.
  # libsqlite3-sys (pulled via sqlx → la-storage) needs a C cross
  # compiler to build for windows-gnu, so install mingw-w64.
  windows-check:
    name: cargo check (windows target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --target x86_64-pc-windows-gnu
        run: cargo check --workspace --lib --bins --target x86_64-pc-windows-gnu
