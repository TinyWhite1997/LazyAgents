name: ci

# WEK-72 / M4.0.5 — PR-level three-OS matrix.
#
# Anchor A1 (matrix CI on PR before M4.1) + A5.3 (runner ↔ target pin).
# Job names are stable (`ci / <runner>`) so M4.6 can pin them as required
# checks on `main` once the matrix has been green for ≥1 PR cycle.
# Branch protection flip itself stays in M4.6 — this task only raises the
# signal.
#
# A5.3 runner pin table (do NOT use `*-latest` — release.yml shares this
# mapping and tag-cut reproducibility depends on the pin):
#
#   ubuntu-22.04   → x86_64-unknown-linux-gnu
#   macos-14       → aarch64-apple-darwin
#   macos-13       → x86_64-apple-darwin
#   windows-2022   → x86_64-pc-windows-msvc

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: ci / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-14
          - macos-13
          - windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-${{ matrix.os }}

      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-22.04'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --lib --bins -- -D warnings

      # WEK-40: any la-proto type change must regenerate docs/schema/.
      # Run once on Linux — schema output is platform-independent, so
      # repeating on macOS/Windows would only burn minutes.
      - name: gen-schema --check (golden diff)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          out=$(mktemp -d)
          cargo run -q -p la-proto --bin la-proto-gen-schema -- "$out"
          if ! diff -ruN docs/schema "$out"; then
            echo
            echo '::error::docs/schema/ is stale. Re-run: cargo run -p la-proto --bin la-proto-gen-schema'
            exit 1
          fi

      - name: cargo test
        run: cargo test --workspace --all-targets

      # WEK-72 DoD #1: example config parses + validates once on Linux —
      # same single-run scope as fmt/gen-schema because the toml schema is
      # platform-independent. WEK-71 merged in PR #56, so per the
      # WEK-72 / WEK-71 协作 clause this PR (the later-merging one)
      # wires the step in.
      - name: lad config check (example template)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          cargo run -p la-daemon --bin lad -- config check \
            --config crates/la-daemon/templates/config.example.toml

      # WEK-73 / M4.1 DoD: dry-run lad install / uninstall on the native
      # service mode per OS so a broken template renderer trips CI
      # without depending on root / launchd / Scheduled Task perms.
      - name: lad install --dry-run (systemd)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          cargo run -q -p la-daemon --bin lad -- install --service systemd --dry-run
          cargo run -q -p la-daemon --bin lad -- uninstall --service systemd --dry-run

      - name: lad install --dry-run (launchd)
        if: matrix.os == 'macos-14' || matrix.os == 'macos-13'
        shell: bash
        run: |
          cargo run -q -p la-daemon --bin lad -- install --service launchd --dry-run
          cargo run -q -p la-daemon --bin lad -- uninstall --service launchd --dry-run

      - name: lad install --dry-run (windows-task)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          cargo run -q -p la-daemon --bin lad -- install --service windows-task --dry-run
          cargo run -q -p la-daemon --bin lad -- uninstall --service windows-task --dry-run

      # Folded in from the retired m2-smoke.yml — snapshots are useful for
      # diagnosing failures across runners, so upload per OS.
      - name: upload m2-smoke snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m2-smoke-snapshots-${{ matrix.os }}
          path: target/m2-smoke/snapshots/
          if-no-files-found: warn
